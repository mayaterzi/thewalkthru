<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Walk Thru</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />

<style>
/* ───────── RESET ───────── */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --white: #fff;
  --dark: #340E0A;
}

body {
  background: var(--dark);
  color: var(--white);
  font-family: 'Noto Serif', serif;
  overflow-x: hidden;
}

/* ───────── HEADER ───────── */
header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;

  background: transparent; /* FULLY TRANSPARENT */
  box-shadow: 0 10px 30px rgba(0,0,0,0.25); /* subtle depth */
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  height: 92px; /* taller header */
  padding: 0 2.5rem;

  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* LOGO */
.nav-logo img {
  height: 56px; /* bigger logo */
  width: auto;
  display: block;
}

/* LINKS */
.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}

.nav-links a {
  font-family: 'Unbounded', sans-serif;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
}

.nav-links a:hover {
  color: white;
}

/* ───────── HERO ───────── */
.hero {
  min-height: 90vh; /* shorter hero */
  display: flex;
  align-items: center;
  justify-content: center;

  background-image: url('./hero.png');
  background-size: cover;
  background-position: center 45%; /* moved upward focal control */
  background-repeat: no-repeat;
}

.hero-inner {
  max-width: 1200px;
  width: 100%;
  padding: 0 2rem;
}

.hero-heading {
  font-family: 'Unbounded', sans-serif;
  font-size: clamp(40px, 6vw, 90px);
  font-weight: 900;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.hero-subheading {
  font-style: italic;
  text-align: right;
  font-size: clamp(16px, 2vw, 22px);
}

/* ───────── BLURB ───────── */
.blurb-section {
  padding: 6rem 2rem;
}

.blurb-inner {
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
}

/* ───────── MARQUEE ───────── */
.marquee-section {
  background: transparent;
  padding: 7rem 0;
  overflow: hidden;
}

.marquee-track {
  display: flex;
  width: max-content;
  animation: scroll 25s linear infinite;
}

.marquee-item {
  font-family: 'Unbounded', sans-serif;
  font-weight: 900;
  text-transform: uppercase;
  font-size: 18px;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.9);
  padding: 0 2rem;
  white-space: nowrap;
}

.marquee-sep {
  color: rgba(255,255,255,0.25);
}

@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ───────── QUOTE ───────── */
.quote-section {
  padding: 6rem 2rem;
  text-align: center;
}

/* ───────── FOOTER ───────── */
footer {
  padding: 4rem 2rem;
}

/* SOCIAL ICONS */
.social-row {
  display: flex;
  gap: 0.8rem;
}

.social-link {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.6);
}

.social-link:hover {
  border-color: white;
  color: white;
}

.social-link svg {
  width: 14px;
  height: 14px;
  fill: currentColor;
}

/* MOBILE */
@media (max-width: 768px) {
  nav {
    height: 80px;
  }

  .nav-links {
    display: none;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <nav>
    <a class="nav-logo" href="#">
      <img src="./logo.png" alt="logo" />
    </a>

    <ul class="nav-links">
      <li><a href="#">Blog</a></li>
      <li><a href="#">Archive</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <h1 class="hero-heading">The Walk Thru</h1>
    <p class="hero-subheading">Where fashion strides forward;</p>
  </div>
</section>

<!-- BLURB -->
<section class="blurb-section">
  <div class="blurb-inner">
    <p>
      The Walk Thru is a biweekly cultural blog at the intersection of fashion and sport.
    </p>
  </div>
</section>

<!-- MARQUEE -->
<section class="marquee-section">
  <div class="marquee-track">

    <span class="marquee-item">AUTHENTIC</span>
    <span class="marquee-sep">•</span>
    <span class="marquee-item">CURATED</span>
    <span class="marquee-sep">•</span>
    <span class="marquee-item">BOLD</span>
    <span class="marquee-sep">•</span>

    <span class="marquee-item">AUTHENTIC</span>
    <span class="marquee-sep">•</span>
    <span class="marquee-item">CURATED</span>
    <span class="marquee-sep">•</span>
    <span class="marquee-item">BOLD</span>

  </div>
</section>

<!-- FOOTER SOCIAL FIX -->
<footer>
  <div class="social-row">

    <!-- Instagram FIXED -->
    <a class="social-link" href="https://instagram.com/walkthru.blog" target="_blank">
      <svg viewBox="0 0 24 24">
        <path d="M7.75 2h8.5A5.76 5.76 0 0122 7.75v8.5A5.76 5.76 0 0116.25 22h-8.5A5.76 5.76 0 012 16.25v-8.5A5.76 5.76 0 017.75 2zm8.5 1.5h-8.5A4.26 4.26 0 003.5 7.75v8.5A4.26 4.26 0 007.75 20.5h8.5a4.26 4.26 0 004.25-4.25v-8.5A4.26 4.26 0 0016.25 3.5z"/>
      </svg>
    </a>

  </div>
</footer>

</body>
</html>
